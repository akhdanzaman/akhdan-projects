<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — Akhdan Projects</title>
  <link rel="icon" href="https://cdn.prod.website-files.com/687117f971cd518b166221a9/6875f721617f26cec12608d0_icon.png">
  <style>
    :root {
      --bg: #f0f2f5; --bg-card: #fff; --bg-dark: #111827; --text: #111827;
      --text2: #6b7280; --border: #e5e7eb; --accent: #111827; --danger: #ef4444;
      --green: #10b981; --radius: 8px; --font: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; }

    /* LOGIN */
    .login-overlay { position: fixed; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: #fff; padding: 2.5rem; border-radius: 12px; width: 380px; max-width: 90vw; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-box h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .login-box p { color: var(--text2); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .login-box input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; margin-bottom: 0.75rem; font-family: var(--font); }
    .login-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(17,24,39,0.1); }
    .login-box .btn { width: 100%; padding: 0.75rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: var(--font); }
    .login-box .btn:hover { background: #1f2937; }
    .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }

    /* APP */
    .app { display: none; height: 100vh; }
    .app.visible { display: flex; }

    /* SIDEBAR */
    .sidebar { width: 280px; min-width: 280px; background: var(--bg-dark); color: #fff; display: flex; flex-direction: column; }
    .sidebar-hd { padding: 1rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-hd h2 { font-size: 0.95rem; font-weight: 600; }
    .sidebar-hd button { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 0.25rem 0.65rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-family: var(--font); }
    .sidebar-hd button:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .sidebar-add { padding: 0.6rem 1.25rem; }
    .sidebar-add button { width: 100%; padding: 0.5rem; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 0.8rem; }
    .sidebar-add button:hover { background: rgba(255,255,255,0.12); }

    .proj-list { flex: 1; overflow-y: auto; padding: 0.25rem 0; }
    .proj-item { padding: 0.7rem 1.25rem; cursor: pointer; border-left: 3px solid transparent; display: flex; flex-direction: column; gap: 0.1rem; position: relative; }
    .proj-item:hover { background: rgba(255,255,255,0.05); }
    .proj-item.active { background: rgba(255,255,255,0.08); border-left-color: #fff; }
    .proj-item .name { font-size: 0.82rem; font-weight: 600; line-height: 1.3; padding-right: 24px; }
    .proj-item .meta { font-size: 0.7rem; color: rgba(255,255,255,0.45); }
    .proj-item .del-btn { position: absolute; top: 0.6rem; right: 0.75rem; background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; font-size: 0.85rem; padding: 2px 6px; border-radius: 3px; }
    .proj-item .del-btn:hover { color: var(--danger); background: rgba(239,68,68,0.15); }
    .sidebar-stat { padding: 0.6rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.7rem; color: rgba(255,255,255,0.3); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-bar { padding: 0.55rem 1.25rem; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .main-bar h3 { font-size: 0.95rem; font-weight: 600; margin-right: auto; }
    .main-bar button { padding: 0.35rem 0.75rem; border: 1px solid var(--border); background: var(--bg-card); border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-family: var(--font); white-space: nowrap; }
    .main-bar button:hover { background: var(--bg); }
    .main-bar .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .main-bar .btn-save:hover { background: #1f2937; }
    .main-bar .btn-export { background: var(--green); color: #fff; border-color: var(--green); }

    .editor-wrap { flex: 1; display: flex; overflow: hidden; }
    .editor-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .editor-pane:first-child { border-right: 1px solid var(--border); }
    .pane-label { padding: 0.35rem 1rem; background: #f9fafb; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }

    /* TABS in metadata pane */
    .meta-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-card); }
    .meta-tab { padding: 0.45rem 1rem; cursor: pointer; font-size: 0.78rem; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.15s; }
    .meta-tab:hover { color: var(--text); }
    .meta-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

    /* FORMS */
    .form-scroll { flex: 1; overflow-y: auto; padding: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.03em; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; font-family: var(--font); background: var(--bg-card); }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(17,24,39,0.06); }
    .form-group textarea { min-height: 70px; resize: vertical; }

    /* Tag input */
    .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 4px; padding: 0.4rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); min-height: 38px; align-items: center; }
    .tag-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(17,24,39,0.06); }
    .tag-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; background: var(--bg-dark); color: #fff; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
    .tag-chip button { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 0; margin-left: 2px; }
    .tag-chip button:hover { color: #fff; }
    .tag-input-wrap input { border: none !important; outline: none; padding: 2px 4px; font-size: 0.8rem; flex: 1; min-width: 80px; background: transparent !important; box-shadow: none !important; }

    /* MARKDOWN EDITOR */
    textarea.md-editor { flex: 1; padding: 1.25rem; border: none; resize: none; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; font-size: 0.88rem; line-height: 1.6; outline: none; tab-size: 2; background: var(--bg-card); }
    .preview-pane { flex: 1; padding: 1.25rem; overflow-y: auto; background: var(--bg-card); line-height: 1.7; font-size: 0.9rem; }
    .preview-pane h1 { font-size: 1.6rem; margin: 0.8rem 0 0.4rem; }
    .preview-pane h2 { font-size: 1.3rem; margin: 1.2rem 0 0.4rem; }
    .preview-pane h3 { font-size: 1.1rem; margin: 1rem 0 0.3rem; }
    .preview-pane p { margin-bottom: 0.65rem; }
    .preview-pane ul, .preview-pane ol { margin-bottom: 0.65rem; padding-left: 1.5rem; }
    .preview-pane blockquote { border-left: 3px solid var(--accent); padding: 0.4rem 1rem; margin: 0.8rem 0; color: var(--text2); font-style: italic; }
    .preview-pane img { max-width: 100%; border-radius: 6px; margin: 0.5rem 0; }
    .preview-pane code { background: #f1f3f5; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }

    /* STATUS */
    .status-bar { padding: 0.35rem 1rem; background: var(--bg-dark); color: rgba(255,255,255,0.5); font-size: 0.7rem; display: flex; align-items: center; gap: 1rem; }
    .status-bar .ok { color: var(--green); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-overlay.on { display: flex; }
    .modal { background: #fff; padding: 1.5rem; border-radius: 12px; width: 500px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h3 { margin-bottom: 1rem; }
    .modal .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
    .modal button { padding: 0.45rem 1rem; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: var(--font); }
    .modal button.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .modal input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; margin-bottom: 0.6rem; font-family: var(--font); }

    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; max-height: 170px; }
      .editor-wrap { flex-direction: column; }
      .editor-pane:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .editor-pane { max-height: 50vh; }
    }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>🔐 CMS</h1>
    <p>Akhdan Projects</p>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="loginError">Invalid credentials</p>
  </div>
</div>

<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-hd">
      <h2>📝 Projects</h2>
      <button onclick="logout()">Logout</button>
    </div>
    <div class="sidebar-add"><button onclick="addProject()">+ New Project</button></div>
    <div class="proj-list" id="projList"></div>
    <div class="sidebar-stat" id="sidebarStat">0 projects</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-bar">
      <h3 id="editorTitle">Select a project</h3>
      <button onclick="openImageModal()">🖼️ Image</button>
      <button onclick="insertMD('**bold**')">B</button>
      <button onclick="insertMD('*italic*')"><em>I</em></button>
      <button onclick="insertMD('\n## H2\n')">H2</button>
      <button onclick="insertMD('\n- item\n')">•</button>
      <button onclick="insertMD('\n> quote\n')">❝</button>
      <button class="btn-export" onclick="exportData()">📥 Export JSON</button>
      <button class="btn-save" onclick="save()">💾 Save</button>
    </div>
    <div class="editor-wrap" id="editorWrap">
      <!-- Metadata -->
      <div class="editor-pane" id="metaPane">
        <div class="meta-tabs">
          <div class="meta-tab active" onclick="switchMetaTab('info')">Info</div>
          <div class="meta-tab" onclick="switchMetaTab('tags')">Tags</div>
          <div class="meta-tab" onclick="switchMetaTab('meta')">Meta Grid</div>
        </div>
        <div class="form-scroll" id="metaForm"></div>
      </div>
      <!-- Content -->
      <div class="editor-pane" id="contentPane">
        <div class="pane-label"><span>Markdown</span><span id="saveStatus" style="color:var(--green);display:none">✓</span></div>
        <textarea class="md-editor" id="mdEditor" placeholder="Select a project..."></textarea>
      </div>
      <!-- Preview -->
      <div class="editor-pane" id="previewPane">
        <div class="pane-label">Preview</div>
        <div class="preview-pane" id="preview"></div>
      </div>
    </div>
    <div class="status-bar">
      <span id="statusText">Ready</span>
      <span class="ok" id="savedOk" style="display:none">✓ Saved to localStorage</span>
    </div>
  </div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="imageModal">
  <div class="modal">
    <h3>🖼️ Insert Image</h3>
    <label style="font-size:0.8rem;font-weight:600">URL</label>
    <input type="text" id="imgUrl" placeholder="https://...">
    <label style="font-size:0.8rem;font-weight:600">Alt text</label>
    <input type="text" id="imgAlt" placeholder="Description">
    <div class="btn-row">
      <button onclick="closeImageModal()">Cancel</button>
      <button class="danger" onclick="insertImage()">Insert</button>
    </div>
  </div>
</div>

<script>
// ============ AUTH ============
const AUTH_KEY = 'akhdan_cms_auth';
const DATA_KEY = 'akhdan_cms_data';

function doLogin() {
  if (document.getElementById('username').value.trim() === 'admin' && document.getElementById('password').value === 'thebestfutureuponmeEe') {
    localStorage.setItem(AUTH_KEY, 'true');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    init();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() { localStorage.removeItem(AUTH_KEY); location.reload(); }
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (localStorage.getItem(AUTH_KEY) === 'true') { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('app').classList.add('visible'); init(); }

    results:'A complete personal OS with 8 integrated views backed by Gemini AI — local-first, PWA-capable, actively maintained.',
    heroImage:'https://images.unsplash.com/photo-1488190211105-8b0e65b80b4e?w=1280&h=480&fit=crop',
    tags:['REACT','GEMINI AI','GOOGLE SHEETS','OPENCLAW','FULLSTACK'],
    content: `## Arkaiv — Ngarsip Harian, Unpacked\n\n> "How can I build a single system that actually understands my daily life — and helps me run it better?"\n\nIn 2026, I built **Arkaiv** (Indonesian for "archive"), short for *Ngarsip Harian* — Daily Archiving. It started as a notes dump and evolved into a full personal operating system.\n\nThe app has **8 integrated views**: Money, Notes, Tasks, Shopping, Calendar, Focus, Library, and Summary — all powered by Google Gemini AI, local-first with Google Sheets sync.\n\n**Core Insight**\n- A single unified interface replaces the mental overhead of juggling 5+ separate tools\n- AI works best when it observes passively and surfaces insights\n- Google Sheets as a sync layer is surprisingly powerful: human-readable, versioned, free\n- Multi-model AI routing (Gemini Flash for speed, Pro for depth) keeps the app fast and cheap\n- Orchestrating AI agents with Scrum inside OpenClaw produced production-grade code at solo-founder speed\n\n### Insight #1: Local-First, Sheets-Synced Architecture\nInstead of a traditional database, Arkaiv uses local-first + Google Sheets sync. All data lives in the browser with Google Sheets as the persistent backend.\n- **Zero infra costs:** No database servers\n- **Human-readable backups:** Every entry is a row in Sheets\n- **Batch parsing pipeline:** Custom batchParserCoordinator with canonicalization and validation\n- **Spreadsheet reconciliation:** spreadsheetReconciler diffs local state against Sheets\n\n### Insight #2: Multi-Model AI Routing\nNot every AI task needs Gemini Pro — sometimes Flash is 10x cheaper. A custom parser model router classifies incoming text by complexity:\n- Simple categorization → Flash\n- Complex parsing → Pro\n- Weekly summaries → Pro with structured prompts\n- Chat queries → Context-aware routing\n\n### Insight #3: Behavior Caching and Deep Work Mode\n**Behavior Cache:** Learns recurring patterns — if you always categorize "kopi kenangan" as coffee, it stops asking. Cut parsing latency by 40%.\n**Deep Work Transformer:** A Focus view that transforms tasks into timed deep-work blocks, synced with Calendar. Backed by spec NDC-008 with automated ship-gate validation.\n\n### Insight #4: Building with AI Agents — OpenClaw Scrum\nI orchestrated AI agents inside OpenClaw with Scrum: Product Owner (me), Engineering agents, QA agents, Design agents. The docs/ directory has 20+ spec documents, 15+ screenshot validation runs, automated benchmarks.\n\n### Tech Stack\n- **Frontend:** React 19 + Vite 6 + Tailwind CSS 4, Framer Motion, Recharts\n- **Backend:** Express.js 5, TypeScript, Vercel serverless\n- **AI:** Google Gemini (Flash + Pro) with custom model router\n- **Data:** Local-first + Google Sheets sync via API\n- **Integrations:** Google Calendar API, Google OAuth\n- **PWA:** Full offline via vite-plugin-pwa\n\n## Strategic Takeaways\nArkaiv proved that a personal tool built with intention and modern AI can outperform polished SaaS. It demonstrated AI-orchestrated solo development producing production-grade, tested, documented software at team speed.\n\n**Status:** Live & actively maintained. **Stack:** React 19 + Vite + Express + Gemini + Google Sheets. **Repo:** private (akhdanzaman/notes-dump).`

    heroImage:'https://cdn.prod.website-files.com/687117f971cd518b166221a9/6871f67b7972b4b2fbff4287_d4963dd3-20cc-49f2-b0f3-129546ab05d4.png',
    tags:['POWER BI','CUSTOMER SATISFACTION','DATA ANALYSIS','VISUALIZATION'],
    content:'## Olist Case Study, Unpacked\n\n> "What truly separates a satisfied customer from a deeply disappointed one?"\n\n**Core Insight**\n1. A healthy average can hide operational illness\n2. Products and sellers aren\'t the real culprits\n3. Delivery delays trigger customer dissatisfaction\n4. The shipping phase is the true bottleneck\n5. Delay hotspots are route-specific\n6. High cost ≠ fast delivery — financial inefficiencies exposed\n\n### Insight #1: Surface-Level Health Can Hide Internal Dysfunction\n![Olist Dashboard](https://cdn.prod.website-files.com/687117f971cd518b166221a9/68727945c3f561671347630c_1.png)\n\nWith a solid 4.09 out of 5, leadership could\'ve easily concluded everything was fine. But averages can lie — they mask extremes that cancel each other out.\n\n### Insight #2: It\'s Not the Products or the Sellers\n![Product Analysis](https://cdn.prod.website-files.com/687117f971cd518b166221a9/6872794533838b79611b3f0d_2.png)\n\nPerformance lines were largely flat — top categories and sellers showed no red flags. The obvious culprits were innocent.\n\n### Insight #3: The Turning Point — Delay Drives Dissatisfaction\n![On-Time vs Late](https://cdn.prod.website-files.com/687117f971cd518b166221a9/68727945750d80a157082fbf_3.png)\n\nOn-time deliveries earned 4s and 5s. Late ones got 1s and 2s. Logistics was the #1 driver of customer experience.\n\n### Insight #4: Diagnosing the Delay — Where\'s the Time Lost?\n![Logistics Report](https://cdn.prod.website-files.com/687117f971cd518b166221a9/6872794581428b13e9127d9a_4.png)\n\nShipping time ballooned from 8 to 27+ days for late orders. The bottleneck was transit — the logistics partners.\n\n### Insight #5: Mapping the Epicenter\n![Delay Matrix](https://cdn.prod.website-files.com/687117f971cd518b166221a9/687279445fe95b0ea228de3e_5.png)\n\nOnly certain routes were severely affected — especially SP to northeastern states.\n\n### Insight #6: High Costs, Slow Deliveries — The Worst Combo\n![Cost vs Time](https://cdn.prod.website-files.com/687117f971cd518b166221a9/687279457d0489bf504f8247_7.png)\n\nOlist was overpaying for subpar service — a double hit: poor experience and wasted budget.\n\n## Strategic Takeaways\n- Audit and renegotiate logistics partners on high-cost, high-delay routes\n- Enforce stricter SLAs\n- Use data as leverage\n\nIn modern e-commerce, delivery isn\'t just a service — it\'s part of the product.'

// ============ STATE ============
let data = null;
let curIdx = -1;
let dirty = false;

function load() {
  const raw = localStorage.getItem(DATA_KEY);
  if (raw) { try { data = JSON.parse(raw); } catch(e) {} }
  if (!data || !data.projects || !Array.isArray(data.projects)) {
    data = { projects: JSON.parse(JSON.stringify(DEFAULTS)) };
  }
}
function persist() {
  localStorage.setItem(DATA_KEY, JSON.stringify(data));
  dirty = false;
  document.getElementById('savedOk').style.display = 'inline';
  document.getElementById('saveStatus').style.display = 'inline';
  setTimeout(() => { document.getElementById('savedOk').style.display = 'none'; document.getElementById('saveStatus').style.display = 'none'; }, 2000);
}

// ============ RENDER SIDEBAR ============
function renderSidebar() {
  const list = document.getElementById('projList');
  list.innerHTML = data.projects.map((p, i) => `
    <div class="proj-item${i === curIdx ? ' active' : ''}" onclick="select(${i})">
      <div class="name">${esc(p.title)}</div>
      <div class="meta">${esc(p.subtitle)} · ${esc(p.author)} · ${esc(p.date)}</div>
      <button class="del-btn" onclick="event.stopPropagation();delProject(${i})" title="Delete">×</button>
    </div>
  `).join('');
  document.getElementById('sidebarStat').textContent = `${data.projects.length} project${data.projects.length !== 1 ? 's' : ''}`;
}

// ============ EDITOR ============
let metaTab = 'info';

function select(i) {
  if (dirty && !confirm('Unsaved changes. Discard?')) return;
  curIdx = i;
  dirty = false;
  metaTab = 'info';
  const p = data.projects[i];
  document.getElementById('editorTitle').textContent = p.title;
  document.getElementById('mdEditor').value = p.content || '';
  updatePreview();
  renderMetaForm();
  renderSidebar();
  document.querySelectorAll('.meta-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.meta-tab').classList.add('active');
  document.getElementById('statusText').textContent = `Editing: ${p.title}`;
}

function renderMetaForm() {
  const p = data.projects[curIdx];
  const form = document.getElementById('metaForm');
  if (metaTab === 'info') {
    form.innerHTML = `
      <div class="form-group"><label>Title</label><input id="f_title" value="${escAttr(p.title)}" oninput="onFieldChange()"></div>
      <div class="form-group"><label>Subtitle (shown in tab)</label><input id="f_subtitle" value="${escAttr(p.subtitle)}" oninput="onFieldChange()"></div>
      <div class="form-group"><label>Author</label><input id="f_author" value="${escAttr(p.author)}" oninput="onFieldChange()"></div>
      <div class="form-group"><label>Date</label><input id="f_date" value="${escAttr(p.date)}" oninput="onFieldChange()"></div>
      <div class="form-group"><label>Hero Image URL</label><input id="f_hero" value="${escAttr(p.heroImage)}" oninput="onFieldChange()"></div>`;
  } else if (metaTab === 'tags') {
    const tags = (p.tags || []).join(',');
    form.innerHTML = `
      <div class="form-group"><label>Tags (comma-separated, shown on homepage card)</label>
        <div class="tag-input-wrap" id="tagWrap">
          ${(p.tags || []).map(t => `<span class="tag-chip">${esc(t)}<button onclick="this.parentElement.remove();onFieldChange()">×</button></span>`).join('')}
          <input placeholder="Add tag..." onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();addTag(this.value);this.value=''}">
        </div>
      </div>`;
  } else {
    form.innerHTML = `
      <div class="form-group"><label>Toolbox</label><textarea id="f_toolbox" oninput="onFieldChange()">${escAttr(p.toolbox)}</textarea></div>
      <div class="form-group"><label>Techniques</label><textarea id="f_techniques" oninput="onFieldChange()">${escAttr(p.techniques)}</textarea></div>
      <div class="form-group"><label>Industries</label><textarea id="f_industries" oninput="onFieldChange()">${escAttr(p.industries)}</textarea></div>
      <div class="form-group"><label>Results</label><textarea id="f_results" oninput="onFieldChange()">${escAttr(p.results)}</textarea></div>`;
  }
}

function switchMetaTab(tab) {
  metaTab = tab;
  document.querySelectorAll('.meta-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab)));
  collectMetaFields();
  renderMetaForm();
}

function collectMetaFields() {
  if (curIdx < 0) return;
  const p = data.projects[curIdx];
  if (metaTab === 'info') {
    const f = id => document.getElementById(id);
    if (f('f_title')) { p.title = f('f_title').value; p.subtitle = f('f_subtitle').value; p.author = f('f_author').value; p.date = f('f_date').value; p.heroImage = f('f_hero').value; }
  } else if (metaTab === 'tags') {
    const chips = document.querySelectorAll('#tagWrap .tag-chip');
    p.tags = Array.from(chips).map(c => c.textContent.replace('×','').trim());
  } else {
    const f = id => document.getElementById(id);
    if (f('f_toolbox')) { p.toolbox = f('f_toolbox').value; p.techniques = f('f_techniques').value; p.industries = f('f_industries').value; p.results = f('f_results').value; }
  }
}

function addTag(val) {
  const v = val.trim().replace(/,/g,'');
  if (!v) return;
  const p = data.projects[curIdx];
  if (!p.tags) p.tags = [];
  if (!p.tags.includes(v)) p.tags.push(v);
  onFieldChange();
  renderMetaForm();
}

function onFieldChange() { dirty = true; }

// ============ MARKDOWN ============
const mdEditor = document.getElementById('mdEditor');
mdEditor.addEventListener('input', () => { dirty = true; updatePreview(); });

function updatePreview() {
  document.getElementById('preview').innerHTML = mdToHTML(mdEditor.value);
}
function mdToHTML(md) {
  return md
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">')
    .replace(/^#### (.*$)/gim, '<h4>$1</h4>').replace(/^### (.*$)/gim, '<h3>$1</h3>')
    .replace(/^## (.*$)/gim, '<h2>$1</h2>').replace(/^# (.*$)/gim, '<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
    .replace(/^[\-\*] (.*$)/gim, '<li>$1</li>').replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, m => m.match(/^\d+\./m) ? '<ol>\n'+m+'</ol>\n' : '<ul>\n'+m+'</ul>\n')
    .replace(/^(?!<[houbl]|<img|<blockquote)(.+)/gim, '<p>$1</p>')
    .replace(/<p>\s*<\/p>/g, '').replace(/<\/blockquote>\s*<blockquote>/g, '<br>');
}
function insertMD(text) {
  const s = mdEditor.selectionStart, e = mdEditor.selectionEnd;
  mdEditor.value = mdEditor.value.substring(0,s) + text + mdEditor.value.substring(e);
  mdEditor.focus(); mdEditor.selectionStart = mdEditor.selectionEnd = s + text.length;
  dirty = true; updatePreview();
}

// ============ SAVE ============
function save() {
  if (curIdx < 0) return;
  collectMetaFields();
  data.projects[curIdx].content = mdEditor.value;
  persist();
  dirty = false;
  renderSidebar();
  document.getElementById('statusText').textContent = `Saved: ${data.projects[curIdx].title}`;
}
document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); } });

// ============ CRUD ============
function addProject() {
  const id = 'project-' + Date.now();
  data.projects.unshift({
    id, title:'New Project', subtitle:'', author:'Akhdan Hanif', date:'2026',
    toolbox:'', techniques:'', industries:'', results:'', heroImage:'', tags:[], content:'## New Project\n\nStart writing...'
  });
  persist(); curIdx = 0; dirty = false; metaTab = 'info';
  renderSidebar(); select(0);
}
function delProject(i) {
  if (!confirm(`Delete "${data.projects[i].title}"?`)) return;
  data.projects.splice(i, 1);
  if (curIdx >= data.projects.length) curIdx = data.projects.length - 1;
  persist(); dirty = false;
  renderSidebar();
  if (curIdx >= 0) select(curIdx);
  else { document.getElementById('editorTitle').textContent = 'Select a project'; document.getElementById('mdEditor').value = ''; document.getElementById('metaForm').innerHTML = ''; }
}

// ============ EXPORT ============
function exportData() {
  collectMetaFields();
  if (curIdx >= 0) data.projects[curIdx].content = mdEditor.value;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'akhdan-cms-export.json'; a.click();
}

// ============ IMAGE MODAL ============
function openImageModal() { document.getElementById('imageModal').classList.add('on'); document.getElementById('imgUrl').focus(); }
function closeImageModal() { document.getElementById('imageModal').classList.remove('on'); document.getElementById('imgUrl').value = ''; document.getElementById('imgAlt').value = ''; }
function insertImage() {
  const url = document.getElementById('imgUrl').value.trim();
  const alt = document.getElementById('imgAlt').value.trim() || 'image';
  if (!url) return;
  insertMD(`\n![${alt}](${url})\n`);
  closeImageModal();
}
document.getElementById('imageModal').addEventListener('click', e => { if (e.target === document.getElementById('imageModal')) closeImageModal(); });

// ============ HELPERS ============
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function id(s) { return document.getElementById(s); }

// ============ INIT ============
function init() {
  load();
  renderSidebar();
  if (data.projects.length > 0) select(0);
  document.getElementById('statusText').textContent = 'Ready — Select a project or add new';
}
</script>
</body>
</html>
